# @req SCI-ANS-001
# @req SCI-ANS-003
---
- name: Create Kubernetes namespace
  # @req SCI-ANS-003 - k8s module with state:present is idempotent
  kubernetes.core.k8s:
    name: "{{ kubernetes.namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Create database secret
  # @req SCI-ANS-003 - k8s module with state:present is idempotent
  kubernetes.core.k8s:
    state: present
    namespace: "{{ kubernetes.namespace }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ helm.release_name }}-db-credentials"
      type: Opaque
      stringData:
        username: "{{ database.user }}"
        password: "{{ database.password }}"

- name: Deploy SDD Navigator Helm chart
  # @req SCI-ANS-001 - Deploy in correct order with wait
  # @req SCI-ANS-003 - helm module is idempotent by design
  kubernetes.core.helm:
    name: "{{ helm.release_name }}"
    chart_ref: "{{ helm.chart_path }}"
    release_namespace: "{{ kubernetes.namespace }}"
    create_namespace: "{{ kubernetes.create_namespace }}"
    wait: "{{ helm.wait }}"
    wait_timeout: "{{ helm.wait_timeout }}"
    atomic: "{{ helm.atomic }}"
    values:
      postgresql:
        auth:
          username: "{{ database.user }}"
          password: "{{ database.password }}"
          database: "{{ database.name }}"

- name: Wait for API pods to be ready
  # @req SCI-ANS-001 - Wait for each component to reach ready state
  # @req SCI-ANS-003 - k8s_info with wait is idempotent
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ kubernetes.namespace }}"
    label_selectors:
      - "app.kubernetes.io/component=api"
      - "app.kubernetes.io/instance={{ helm.release_name }}"
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: "{{ deployment.wait_for_ready_timeout }}"

- name: Wait for frontend pods to be ready
  # @req SCI-ANS-001 - Wait for each component to reach ready state
  # @req SCI-ANS-003 - k8s_info with wait is idempotent
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ kubernetes.namespace }}"
    label_selectors:
      - "app.kubernetes.io/component=frontend"
      - "app.kubernetes.io/instance={{ helm.release_name }}"
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: "{{ deployment.wait_for_ready_timeout }}"

- name: Wait for database to be ready
  # @req SCI-ANS-001 - Wait for each component to reach ready state
  # @req SCI-ANS-003 - k8s_info with wait is idempotent
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ kubernetes.namespace }}"
    label_selectors:
      - "app.kubernetes.io/name=postgresql"
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: "{{ deployment.wait_for_ready_timeout }}"
