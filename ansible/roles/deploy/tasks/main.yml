# @req SCI-ANS-001
# @req SCI-ANS-003
---
- name: Create Kubernetes namespace
  # @req SCI-ANS-003 - k8s module with state:present is idempotent
  kubernetes.core.k8s:
    name: "{{ kubernetes.namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Create database secret
  # @req SCI-ANS-003 - k8s module with state:present is idempotent
  kubernetes.core.k8s:
    state: present
    namespace: "{{ kubernetes.namespace }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ helm.release_name }}-db-credentials"
      type: Opaque
      stringData:
        username: "{{ database.user }}"
        password: "{{ database.password }}"

- name: Deploy SDD Navigator Helm chart
  # @req SCI-ANS-001 - Deploy in correct order with wait
  # @req SCI-ANS-003 - helm module is idempotent by design
  kubernetes.core.helm:
    name: "{{ helm.release_name }}"
    chart_ref: "{{ helm.chart_path }}"
    release_namespace: "{{ kubernetes.namespace }}"
    create_namespace: "{{ kubernetes.create_namespace }}"
    wait: "{{ helm.wait }}"
    wait_timeout: "{{ helm.wait_timeout }}"
    atomic: "{{ helm.atomic }}"
    values:
      postgresql:
        auth:
          username: "{{ database.user }}"
          password: "{{ database.password }}"
          database: "{{ database.name }}"

- name: Wait for database to be ready
  # @req SCI-ANS-001 - Verify database reaches ready state before proceeding
  # @req SCI-ANS-003 - kubectl wait is idempotent
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=ready pod
      -l app.kubernetes.io/name=postgresql
      -n {{ kubernetes.namespace }}
      --timeout={{ helm.wait_timeout }}
  register: deploy_database_ready
  failed_when: deploy_database_ready.rc != 0
  changed_when: false

- name: Wait for API pods to be ready
  # @req SCI-ANS-001 - Verify API reaches ready state before proceeding
  # @req SCI-ANS-003 - kubectl wait is idempotent
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=ready pod
      -l app.kubernetes.io/component=api,app.kubernetes.io/instance={{ helm.release_name }}
      -n {{ kubernetes.namespace }}
      --timeout={{ helm.wait_timeout }}
  register: deploy_api_ready
  failed_when: deploy_api_ready.rc != 0
  changed_when: false

- name: Wait for frontend pods to be ready
  # @req SCI-ANS-001 - Verify frontend reaches ready state before proceeding
  # @req SCI-ANS-003 - kubectl wait is idempotent
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=ready pod
      -l app.kubernetes.io/component=frontend,app.kubernetes.io/instance={{ helm.release_name }}
      -n {{ kubernetes.namespace }}
      --timeout={{ helm.wait_timeout }}
  register: deploy_frontend_ready
  failed_when: deploy_frontend_ready.rc != 0
  changed_when: false
