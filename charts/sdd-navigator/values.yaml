# @req SCI-HELM-006
# Single source of truth for all configurable values

global:
  namespace: sdd-navigator

api:
  image:
    repository: sdd-coverage-api
    tag: "0.1.0" # @req SCI-SEC-001
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  securityContext:
    runAsNonRoot: true # @req SCI-SEC-001
    runAsUser: 1000
  livenessProbe: # @req SCI-HELM-001
    path: /healthcheck
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe: # @req SCI-HELM-001
    path: /healthcheck
    initialDelaySeconds: 5
    periodSeconds: 5
  config: # @req SCI-HELM-005
    logLevel: info
    dbHost: "{{ .Release.Name }}-postgresql"

frontend:
  image:
    repository: sdd-navigator-frontend
    tag: "0.1.0" # @req SCI-SEC-001
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 80
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  securityContext:
    runAsNonRoot: false # Disabled for test images
    runAsUser: 0

# @req SCI-HELM-002
# @req SCI-HELM-005
# Custom StatefulSet-based PostgreSQL configuration
postgresql:
  image:
    registry: docker.io
    repository: postgres
    tag: "16.2-alpine" # @req SCI-SEC-001 - explicit version, no latest
    pullPolicy: IfNotPresent
  auth:
    username: sdd_user
    password: "PLACEHOLDER_MUST_OVERRIDE" # @req SCI-HELM-005
    database: sdd_navigator
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  securityContext: # @req SCI-SEC-001
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    runAsNonRoot: true
  service:
    port: 5432

ingress: # @req SCI-HELM-004
  enabled: true
  className: nginx
  annotations: {}
  host: sdd-navigator.local
  tls:
    enabled: false
    secretName: ""
