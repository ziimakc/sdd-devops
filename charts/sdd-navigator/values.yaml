# @req SCI-HELM-006
# Single source of truth for all configurable values

global:
  namespace: sdd-navigator

api:
  image:
    repository: sdd-coverage-api
    tag: "0.1.0" # @req SCI-SEC-001
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  securityContext:
    runAsNonRoot: true # @req SCI-SEC-001
    runAsUser: 1000
  livenessProbe: # @req SCI-HELM-001
    path: /healthcheck
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe: # @req SCI-HELM-001
    path: /healthcheck
    initialDelaySeconds: 5
    periodSeconds: 5
  config: # @req SCI-HELM-005
    logLevel: info
    dbHost: "{{ .Release.Name }}-postgresql"

frontend:
  image:
    repository: sdd-navigator-frontend
    tag: "0.1.0" # @req SCI-SEC-001
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 80
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  securityContext:
    runAsNonRoot: false # Disabled for test images
    runAsUser: 0

# @req SCI-HELM-002
# @req SCI-HELM-005
# Bitnami PostgreSQL chart configuration
postgresql:
  enabled: true
  auth:
    username: sdd_user
    password: "PLACEHOLDER_MUST_OVERRIDE" # @req SCI-HELM-005
    database: sdd_navigator
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    podSecurityContext: # @req SCI-SEC-001
      enabled: true
      fsGroup: 1001
    containerSecurityContext: # @req SCI-SEC-001
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true
  volumePermissions: # @req SCI-HELM-002
    enabled: true
    image:
      registry: docker.io
      repository: bitnami/os-shell
      tag: 11-debian-11-r93 # @req SCI-SEC-001 - explicit version, no latest
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: "16.2.0-debian-12-r13"
  metrics:
    enabled: false

ingress: # @req SCI-HELM-004
  enabled: true
  className: nginx
  annotations: {}
  host: sdd-navigator.local
  tls:
    enabled: false
    secretName: ""
