apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sdd-navigator.fullname" . }}-api
  labels:
    {{- include "sdd-navigator.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "sdd-navigator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "sdd-navigator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.api.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.api.securityContext.runAsUser }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.api.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sdd-navigator.fullname" . }}-config
                  key: logLevel
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "sdd-navigator.fullname" . }}-db
                  key: connection-string
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}