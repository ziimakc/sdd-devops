# @req SCI-CI-001
# @req SCI-CI-002
# @req SCI-TRACE-001
name: Infrastructure CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint

  lint-ansible:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ansible-lint
        run: pip install ansible-lint ansible-core

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run ansible-lint
        run: ansible-lint ansible/playbook.yml
        working-directory: ${{ github.workspace }}

  lint-helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Lint umbrella chart
        run: helm lint charts/sdd-navigator

      - name: Lint API subchart
        run: helm lint charts/sdd-navigator/charts/api

      - name: Lint frontend subchart
        run: helm lint charts/sdd-navigator/charts/frontend

  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Add Bitnami Helm repository
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Build Helm dependencies
        run: helm dependency build charts/sdd-navigator

      - name: Render Helm templates
        run: |
          helm template sdd-navigator charts/sdd-navigator \
            --set database.password=test-password \
            --output-dir /tmp/rendered

      - name: Validate rendered manifests
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -summary \
            -output json \
            /tmp/rendered

  check-traceability:
    name: Check Traceability Annotations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x scripts/check-traceability.sh
          chmod +x scripts/validate-req-references.sh

      - name: Run traceability check
        run: ./scripts/check-traceability.sh

      - name: Validate @req references
        run: ./scripts/validate-req-references.sh

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-yaml, lint-ansible, lint-helm, validate-manifests, check-traceability]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "=== CI Pipeline Summary ==="
          echo ""
          echo "YAML Lint: ${{ needs.lint-yaml.result }}"
          echo "Ansible Lint: ${{ needs.lint-ansible.result }}"
          echo "Helm Lint: ${{ needs.lint-helm.result }}"
          echo "Manifest Validation: ${{ needs.validate-manifests.result }}"
          echo "Traceability Check: ${{ needs.check-traceability.result }}"
          echo ""

          if [[ "${{ needs.lint-yaml.result }}" != "success" ]] || \
             [[ "${{ needs.lint-ansible.result }}" != "success" ]] || \
             [[ "${{ needs.lint-helm.result }}" != "success" ]] || \
             [[ "${{ needs.validate-manifests.result }}" != "success" ]] || \
             [[ "${{ needs.check-traceability.result }}" != "success" ]]; then
            echo "❌ CI Pipeline FAILED"
            exit 1
          else
            echo "✅ CI Pipeline PASSED"
            exit 0
          fi
